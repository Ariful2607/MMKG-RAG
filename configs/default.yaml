project:
  name: MegaRAG++
  version: 0.1.0
  seed: 42

paths:
  raw_data: data/raw
  processed_data: data/processed
  cache: data/cache
  output: outputs

parser:
  dpi: 200
  image_format: png

llm:
  model: Qwen/Qwen2.5-7B-Instruct

vlm:
  provider: huggingface
  model: Qwen/Qwen2.5-VL-7B-Instruct
  device: cuda
  dtype: bfloat16
  max_new_tokens: 1024
  temperature: 0.1

generation:
  provider: huggingface
  model: Qwen/Qwen2.5-7B-Instruct
  
embedding:
  provider: sentence-transformers
  model: BAAI/bge-base-en-v1.5

retrieval:
  top_k: 5