project:
  name: ExtMega-RAG
  version: 0.1.0
  seed: 42

paths:
  raw_data: data/raw
  processed_data: data/processed
  cache: data/cache
  output: outputs

parser:
  dpi: 200
  image_format: png

llm:
  provider: huggingface
  model: Qwen/Qwen2.5-7B-Instruct

vlm:
  provider: huggingface
  model: Qwen/Qwen2.5-VL-7B-Instruct

  # Hardware akan dipilih otomatis oleh Python
  device: auto

  # dtype juga dipilih otomatis jika auto
  dtype: auto

  max_new_tokens: 1024
  temperature: 0.1

generation:
  provider: huggingface
  model: Qwen/Qwen2.5-7B-Instruct

embedding:
  provider: sentence-transformers
  model: BAAI/bge-base-en-v1.5

retrieval:
  top_k: 5

debug:
  enabled: true
  max_pages: 1
  max_chunks_per_page: 1

preprocessing:
  chunk_size: 300
  overlap: 50

entity_extraction:
  max_entities: 10